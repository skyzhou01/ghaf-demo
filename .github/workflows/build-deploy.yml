name: Build * Deploy
on:
  push:
    branches:
      - main
  pull_request:
    types: 
      - opened
      - synchronize
jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: build step
        run: echo "Building the application once the code is commited to the Feature Branch"
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == 'main'
    steps:
      - name: Deploy Step
        run: echo "Depoloying the app after merge to Main Branch"
